<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <script defer src="./example-books.js"></script>
  <script defer src="./script.js"></script>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<main>
  <div id="main-title">LIBRARY</div>

  <div id="library-container">
    <div id="new-book-card"> + </div>
  </div>
</main>

<dialog id="new-book-dialog" closedby="closerequest">
  <form id="new-book-form" method="dialog">
    <div>
      <label for="title">Title</label>
      <input type="text" name="title" id="title" required>
    </div>
    <div>
      <label for="author">author</label>
      <input type="text" name="author" id="author" required>
    </div>
    <div>
      <label for="pages">Pages</label>
      <input type="number" name="pages" id="pages" required>
    </div>
    <div>
      <label for="status">Mark as read</label>
      <input type="checkbox" name="status" id="status">
    </div>
    <div>
      <label for="cover">Cover Image</label>
      <input type="file" name="cover" id="cover" accept="image/*,.jpg">
    </div>
    <button type="submit">Add new book</button>
  </form>

  <button class="close-dialog-btn" type="button">x</button>
</dialog>

<dialog id="book-info-dialog" closedby="any">
  <button class="close-dialog-btn" type="button">x</button>

  <div id="book-info-container">
    <div>
      <img id="info-cover" alt="book cover image" height="180" width="120">
    </div>
    <section id="info-section">
      <div>
        <span>Title:</span>
        <span id="info-title"></span>
      </div>
      <div>
        <span>Author:</span>
        <span id="info-author"></span>
      </div>
      <div>
        <span>Pages:</span>
        <span id="info-pages"></span>
      </div>
      <div>
        <span>Status:</span>
        <span id="info-status"></span>
      </div>
      
      <div id="info-buttons">
        <button id="delete-book" type="button">Remove</button>
        <button type="button" id="read-status-btn">Mark as read</button>
      </div>
    </section>
  </div>
</dialog>

</body>
</html>
