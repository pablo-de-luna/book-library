<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <script defer src="./example-books.js"></script>
  <script defer src="./script.js"></script>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="main-title">LIBRARY</div>

  <main>
    <div id="library-container">
      <div id="new-book-card"> + </div>
    </div>

  </main>

  <dialog id="new-book-dialog" closedby="closerequest">
    <form id="new-book-form" method="dialog">
      <div>
        <label for="title">Title</label>
        <input type="text" name="title" id="title" required>
      </div>
      <div>
        <label for="author">author</label>
        <input type="text" name="author" id="author" required>
      </div>
      <div>
        <label for="pages">Pages</label>
        <input type="number" name="pages" id="pages">
      </div>
      <div>
        <label for="cover">Cover Image</label>
        <input type="file" name="cover" id="cover" accept="image/*,.jpg">
      </div>
      <button type="submit" id="add-book-btn">Add new book</button>
    </form>
  </dialog>

  <dialog id="book-info-dialog" closedby="any" open>
    <div id="book-info-container">
      <div>
        <img id="info-cover" alt="book cover image" height="180" width="120">
      </div>
      <section>
        <div>
          <span>Title:</span>
          <span id="info-title"></span>
        </div>
        <div>
          <span>Author:</span>
          <span id="info-author"></span>
        </div>
        <div>
          <span>Pages:</span>
          <span id="info-pages"></span>
        </div>
      </section>
      <button id="delete-book" type="button">DELETE BOOK</button>
    </div>
  </dialog>
</body>
</html>
